<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Nexus One — React Prototype (state machine)</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono&family=Fraunces:opsz,wght@9..144,400;500&display=swap">
  <style>

    @font-face{font-family:"Geist-Regular";src:local("Geist Regular"),local("Geist")}@font-face{font-family:"Geist-Medium";src:local("Geist Medium"),local("Geist");font-weight:500}@font-face{font-family:"Geist-SemiBold";src:local("Geist SemiBold"),local("Geist");font-weight:600}@font-face{font-family:"Delight";src:local("Fraunces")}@font-face{font-family:"Delight-Regular";src:local("Fraunces")}@font-face{font-family:"Delight-Medium";src:local("Fraunces")}*{box-sizing:border-box}
    body { margin: 0; padding: 80px 20px 60px; background: #1A1A1A; font-family: 'Geist', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .screen { display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border-radius: 16px; }
    .screen.active { display: flex; }
    .screen [data-route-to] { cursor: pointer; transition: filter 0.12s ease, transform 0.12s ease; }
    .screen [data-route-to]:hover { filter: brightness(0.97); }
    .screen [data-route-to]:active { transform: translateY(1px); }

    /* ─── Micro-interactions: shared animations ─── */
    @keyframes nx-fadeIn {
      from { opacity: 0; transform: translateY(8px) scale(0.992); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes nx-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* Screen visibility — no animation here; mode/overlay wrappers handle the fade */

    /* ─── Batch 1: Root, empty (3H-0, 4X-0, 7G-0) ─── */
    /* 32×32 top-bar icon buttons (history clock, X close): subtle scale + bg shift on hover */
    .screen [style*="width:32px"][style*="height:32px"][style*="outline:1px solid #E8E8E7"] {
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="width:32px"][style*="height:32px"][style*="outline:1px solid #E8E8E7"]:hover {
      background-color: #F4F4F3 !important;
      transform: scale(1.05);
    }
    .screen [style*="width:32px"][style*="height:32px"][style*="outline:1px solid #E8E8E7"]:active {
      transform: scale(0.96);
    }

    /* Recipient "Edit" pill — bg #E8F0FF deepens, slight scale */
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:999px"] {
      cursor: pointer;
      transition: background-color 0.16s ease, transform 0.16s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:999px"]:hover {
      background-color: #D7E5FF !important;
      transform: scale(1.04);
    }
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:999px"]:active {
      transform: scale(0.97);
    }

    /* Dashed-border placeholder pills ("Select asset", "Assets") — solidify to blue on hover */
    .screen [style*="border-style:dashed"][style*="border-radius:999px"] {
      cursor: pointer;
      transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="border-style:dashed"][style*="border-radius:999px"]:hover {
      border-color: #006BF4 !important;
      background-color: #F4F8FF !important;
      transform: scale(1.02);
    }

    /* Placeholder "0" amount (gray #C9C9C5 in Delight) — append a blinking cursor */
    .screen [style*="color:#C9C9C5"][style*="Delight-Regular"]::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 0.78em;
      background-color: #006BF4;
      vertical-align: -0.05em;
      margin-left: 4px;
      animation: nx-blink 1.1s steps(1, end) infinite;
    }

    /* ─── Batch 2: Multi-asset filled (30R-0, 1-0, GK-0) ─── */
    /* Token pills (filled — white bg + outline + soft shadow): lift on hover */
    .screen [style*="background-color:#FFFFFE"][style*="border-color:#E8E8E7"][style*="border-radius:999px"][style*="box-shadow:#1616150A"] {
      cursor: pointer;
      transition: transform 0.16s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.16s ease;
    }
    .screen [style*="background-color:#FFFFFE"][style*="border-color:#E8E8E7"][style*="border-radius:999px"][style*="box-shadow:#1616150A"]:hover {
      transform: translateY(-1px);
      box-shadow: #1616151F 0px 3px 8px !important;
    }
    .screen [style*="background-color:#FFFFFE"][style*="border-color:#E8E8E7"][style*="border-radius:999px"][style*="box-shadow:#1616150A"]:active {
      transform: translateY(0);
    }

    /* Per-row 24×24 X-delete circles — red tint on hover */
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:999px"][style*="width:24px"] {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:999px"][style*="width:24px"]:hover {
      background-color: #FFE4E4 !important;
      transform: scale(1.1);
    }
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:999px"][style*="width:24px"]:active {
      transform: scale(0.9);
    }

    /* % shortcut buttons (25/50/75 — gray pill, rounded 8) */
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:8px"] {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:8px"]:hover {
      background-color: #E0E0DF !important;
      transform: scale(1.02);
    }
    .screen [style*="background-color:#F0F0EF"][style*="border-radius:8px"]:active {
      transform: scale(0.97);
    }

    /* MAX button (blue pill, rounded 8) */
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:8px"] {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:8px"]:hover {
      background-color: #D7E5FF !important;
      transform: scale(1.04);
    }
    .screen [style*="background-color:#E8F0FF"][style*="border-radius:8px"]:active {
      transform: scale(0.97);
    }

    /* Primary blue CTA ("Review swap", "Swap now", "Done") */
    .screen [style*="background-color:#006BF4"][style*="border-radius:12px"],
    .screen [style*="background-color:#006BF4"][style*="border-radius:8px"] {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.18s ease;
    }
    .screen [style*="background-color:#006BF4"][style*="border-radius:12px"]:hover,
    .screen [style*="background-color:#006BF4"][style*="border-radius:8px"]:hover {
      background-color: #005CD0 !important;
      box-shadow: 0 6px 18px rgba(0, 107, 244, 0.32);
    }
    .screen [style*="background-color:#006BF4"][style*="border-radius:12px"]:active,
    .screen [style*="background-color:#006BF4"][style*="border-radius:8px"]:active {
      transform: scale(0.99);
      background-color: #004FB5 !important;
    }

    /* Active amount-input cursor (1px wide blue bar) — blink */
    .screen [style*="background-color:#006BF4"][style*="width:1px"] {
      animation: nx-blink 1.05s steps(1, end) infinite;
    }

    /* ─── Class-based rules (set via JS in init()) — more visible + !important so they win ─── */
    .nx-pill {
      cursor: pointer;
      /* Push the pill to the right edge of its flex parent so the row's
         pill ends up flush-right regardless of whether the X-delete is
         shown alongside it. Using max-content on the parent isn't enough
         because the parent has flex-shrink:0 with an explicit pixel width
         coming from Paper's export. */
      margin-left: auto !important;
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.18s ease !important;
    }
    .nx-pill:hover {
      transform: translateY(-2px) scale(1.02) !important;
      box-shadow: #1616153D 0px 6px 16px !important;
    }
    .nx-pill:active {
      transform: translateY(0) scale(1) !important;
    }
    .nx-pct {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .nx-pct:hover {
      background-color: #D8D8D7 !important;
      transform: scale(1.05) !important;
    }
    .nx-pct:active {
      transform: scale(0.96) !important;
    }
    /* X-delete is hidden by default and removed from layout (display:none)
       so the row's right section fills naturally. JS reveals it on the row
       that currently has the typing cursor. */
    .nx-xdel {
      cursor: pointer;
      display: none !important;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .nx-xdel.nx-xdel-visible {
      display: inline-flex !important;
    }
    .nx-xdel.nx-xdel-visible:hover {
      background-color: #FFD9D9 !important;
      transform: scale(1.15) !important;
    }
    .nx-xdel.nx-xdel-visible:active {
      transform: scale(0.88) !important;
    }
    /* Picker row: selected state matches Paper — only the radio dot differs;
       no tinted row background, no blue left-edge bar. */
    .nx-row.nx-row-selected {
      background-color: #FFFFFE !important;
    }
    .nx-max {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .nx-max:hover {
      background-color: #C8DAFE !important;
      transform: scale(1.06) !important;
    }
    .nx-max:active {
      transform: scale(0.96) !important;
    }
    .nx-cta {
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s ease !important;
    }
    .nx-cta:hover {
      background-color: #005CD0 !important;
      box-shadow: 0 8px 22px rgba(0, 107, 244, 0.36) !important;
      transform: translateY(-1px) !important;
    }
    .nx-cta:active {
      transform: translateY(0) scale(0.995) !important;
      background-color: #004FB5 !important;
    }
    .nx-cursor {
      animation: nx-blink 1.05s steps(1, end) infinite !important;
    }

    /* ─── Batch 3: picker screens (YC-0, 1QQ-0, 1N1-0) ─── */
    /* Token rows (clickable full-width rows in picker list) */
    .nx-row {
      cursor: pointer;
      transition: background-color 0.16s ease !important;
    }
    .nx-row:hover {
      background-color: #F4F4F3 !important;
    }
    /* Inactive filter tabs (All / Native / Stables / Custom) */
    .nx-tab {
      cursor: pointer;
      border-radius: 9px !important;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .nx-tab:hover {
      background-color: #E0E0DF !important;
    }
    .nx-tab:active {
      transform: scale(0.97) !important;
    }
    /* Search bar (focus-like glow on hover) */
    .nx-search {
      cursor: text;
      transition: border-color 0.18s ease, box-shadow 0.18s ease !important;
    }
    .nx-search:hover {
      border-color: #C0D5FB !important;
      box-shadow: 0 0 0 3px rgba(0, 107, 244, 0.1) !important;
    }
    /* Recently Used token chips */
    .nx-chip {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .nx-chip:hover {
      background-color: #ECECEA !important;
      transform: scale(1.04) !important;
    }
    .nx-chip:active {
      transform: scale(0.97) !important;
    }

    /* ─── Batch 4: Confirm screen "View Details" / "Hide Details" link affordance ─── */
    .nx-link {
      cursor: pointer;
      transition: filter 0.15s ease !important;
    }
    .nx-link:hover {
      filter: brightness(0.78) saturate(1.1) !important;
    }
    .nx-link:active {
      filter: brightness(0.62) saturate(1.15) !important;
    }

    /* ─── Batch 5: in-flight spinners (25P-0, 20L-0) ─── */
    @keyframes nx-spin {
      to { transform: rotate(360deg); }
    }
    .nx-spinner {
      animation: nx-spin 1.05s linear infinite;
      transform-origin: center;
    }

    /* ─── Batch 6: 20L-0 step-row staggered reveal ─── */
    @keyframes nx-stepIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .nx-step {
      animation: nx-stepIn 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ─── Batch 6: 11W-0 checkmark draw ─── */
    @keyframes nx-draw {
      from { stroke-dashoffset: 22; }
      to { stroke-dashoffset: 0; }
    }
    .nx-check-path {
      stroke-dasharray: 22;
      stroke-dashoffset: 22;
      animation: nx-draw 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    /* ─── Batch 6: 184-0 transaction-history card hover ─── */
    .nx-tx-card {
      cursor: pointer;
      transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s ease !important;
    }
    .nx-tx-card:hover {
      background-color: #FCFCFB !important;
      border-color: #D0D0CE !important;
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 14px rgba(22, 22, 21, 0.06) !important;
    }
    .nx-tx-card:active {
      transform: translateY(0) !important;
    }

    /* ─── Batch 7: "Scroll to view more" arrow bounce (2LH-0, 2TG-0) ─── */
    @keyframes nx-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }
    .nx-scroll-hint svg {
      animation: nx-bounce 1.5s ease-in-out infinite;
    }

    .nav-bar { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; align-items: center; z-index: 100; }
    .nav-bar select, .nav-bar button { padding: 8px 14px; border-radius: 8px; background: #2A2A2A; color: #FFFFFE; border: 1px solid #3A3A3A; font-size: 13px; font-family: inherit; cursor: pointer; }
    .nav-bar select { max-width: 360px; }
    .step-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 8px 14px; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); color: #FFFFFE; border-radius: 999px; font-size: 12px; z-index: 100; }
  

    /* ─── Prototype shell ─── */
    body {
      margin: 0;
      padding: 24px 20px 80px;
      background: #0F0F0F;
      font-family: 'Geist', system-ui, sans-serif;
      color: #FFFFFE;
      min-height: 100vh;
    }
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Dev toolbar — pinned to the right of the viewport */
    .devbar {
      position: fixed;
      top: 24px;
      right: 20px;
      width: 280px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 100;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }
    .devbar-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .devbar-label {
      display: block;
      width: 100%;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7C7C7A;
      margin-bottom: 2px;
    }
    .devbar-btn {
      padding: 6px 12px;
      border-radius: 8px;
      background: #2A2A2A;
      color: #FFFFFE;
      border: 1px solid #3A3A3A;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .devbar-btn:hover { background: #353535; }
    .devbar-btn.active {
      background: #006BF4;
      border-color: #006BF4;
      color: #FFFFFE;
    }
    .devbar-btn.danger {
      background: #2A1818;
      border-color: #4A1F1F;
      color: #FF6B6B;
    }
    .devbar-btn.danger:hover { background: #3A1F1F; }
    .devbar-state {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      line-height: 1.6;
      color: #7C7C7A;
      padding-top: 4px;
      word-break: break-all;
    }
    .devbar-state .k { color: #4A9EE8; }
    .devbar-state .v { color: #B5D5F0; }

    /* Frameless screen wrapper — same style as the other static prototypes */
    .screen-host {
      width: 450px;
      margin: 0 auto;
      position: relative;
    }

    /* Screen stages */
    .stage {
      position: relative;
      width: 450px;
      min-height: 760px;
    }
    .mode-screen { position: relative; min-height: 760px; }
    .overlay-dim {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(20, 20, 20, 0.32);
      backdrop-filter: blur(2px);
      animation: fadeIn 0.24s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .overlay-stage {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Mode-screen transition: quiet opacity-only fade. No translate — the
       horizontal slide felt jumpy when the widget changed height between
       modes. */
    .slide-enter {
      animation: modeFade 0.22s ease-out both;
    }
    @keyframes modeFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* Fade-in for modals/overlays */
    .fade-enter {
      animation: fadeIn 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.985); }
      to   { opacity: 1; transform: scale(1); }
    }
    /* Bottom-sheet slide-up for overlays (asset/destination/chain pickers).
       Anchors to bottom of the parent; entry slides up + fades. */
    .overlay-stage.fade-enter {
      animation: sheetUp 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes sheetUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Inline-edit affordance for recipient */
    [contenteditable="true"].nx-editing {
      outline: 2px solid #006BF4 !important;
      outline-offset: 3px !important;
      border-radius: 4px !important;
      caret-color: #006BF4;
    }

    /* Inline fee/asset expansion */
    .nx-expansion {
      align-self: stretch;
      width: 100%;
      box-sizing: border-box;
      background-color: #F8F8F7;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: 'Geist', system-ui, sans-serif;
      overflow: hidden;
      animation: expandIn 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .nx-expansion-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 14px;
      line-height: 24px;
      color: #848483;
    }
    .nx-expansion-row .nx-val {
      color: #161615;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    /* Asset-detail expansion rows: 4-column grid for clean alignment.
       [ token | chain | amount-token | amount-usd ] */
    .nx-expansion-asset {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      column-gap: 16px;
      align-items: center;
      width: 100%;
      font-size: 14px;
      line-height: 24px;
    }
    .nx-expansion-asset > .nx-ea-sym {
      color: #161615;
      font-weight: 500;
    }
    .nx-expansion-asset > .nx-ea-chain {
      color: #848483;
      font-weight: 400;
    }
    .nx-expansion-asset > .nx-ea-amt {
      color: #161615;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .nx-expansion-asset > .nx-ea-usd {
      color: #848483;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      min-width: 64px;
      text-align: right;
    }
    @keyframes expandIn {
      from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
      to   { opacity: 1; max-height: 360px; }
    }

    /* Forced visibility for the rendered screen inside the React stage */
    .stage .screen { display: flex !important; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
</head>
<body>

    function tagScreenInteractive(screen) {
  screen.querySelectorAll('[style*="display:inline-block"][style*="font-family:system-ui"]').forEach(el => {
    if (!el.textContent.trim()) el.remove();
  });

        // Filled token pills (white bg + outline + soft shadow)
        screen.querySelectorAll('[style*="background-color:#FFFFFE"][style*="border-radius:999px"][style*="box-shadow:#1616150A"]').forEach(el => el.classList.add('nx-pill'));
        // % shortcut buttons (gray rounded-8 pill)
        screen.querySelectorAll('[style*="background-color:#F0F0EF"][style*="border-radius:8px"]').forEach(el => el.classList.add('nx-pct'));
        // X-delete circles (24×24 gray bg, 999px)
        screen.querySelectorAll('[style*="background-color:#F0F0EF"][style*="border-radius:999px"][style*="width:24px"]').forEach(el => el.classList.add('nx-xdel'));
        // MAX shortcut (light-blue rounded-8)
        screen.querySelectorAll('[style*="background-color:#E8F0FF"][style*="border-radius:8px"]').forEach(el => el.classList.add('nx-max'));
        // Primary CTA (blue, rounded-12)
        screen.querySelectorAll('[style*="background-color:#006BF4"][style*="border-radius:12px"], [style*="background-color:#006BF4"][style*="border-radius:8px"][style*="height:48px"]').forEach(el => el.classList.add('nx-cta'));
        // Blue input-cursor bars (1px wide)
        screen.querySelectorAll('[style*="background-color:#006BF4"][style*="width:1px"]').forEach(el => el.classList.add('nx-cursor'));

        // ── Batch 3+4: picker / chain rows (YC-0, 1QQ-0, 1N1-0, 1US-0, 1KX-0) ──
        // Token / chain rows: flex row containing a radio dot, with vertical padding (12 or 16) and horizontal padding 16
        screen.querySelectorAll('div').forEach(el => {
          const s = el.getAttribute('style') || '';
          if (!s.includes('display:flex')) return;
          if (!s.includes('padding-inline:16px')) return;
          if (!(s.includes('padding-block:16px') || s.includes('padding-block:12px'))) return;
          if (!(s.includes('gap:12px') || s.includes('gap:14px'))) return;
          // Must contain a radio dot as a direct child (inactive or active)
          const hasRadio = Array.from(el.children).some(c => {
            const cs = c.getAttribute('style') || '';
            return cs.includes('width:18px') && cs.includes('height:18px') && cs.includes('border-radius:999px') && cs.includes('border-style:solid');
          });
          if (hasRadio) el.classList.add('nx-row');
        });

        // ── Batches 4+7: blue inline links with chevron/arrow icons ──
        // Auto-detects any small flex wrapper containing a blue text child AND an SVG icon child.
        // Catches: View Details / Hide Details (1DB-0, 1FN-0, 1I6-0), "11 assets ^" (13M-0),
        // "Intent #3113 ↗", "View Explorer ↗" (11W-0, 13M-0).
        screen.querySelectorAll('div').forEach(el => {
          const s = el.getAttribute('style') || '';
          if (!s.includes('display:flex')) return;
          if (!s.includes('align-items:center')) return;
          if (!s.includes('gap:3px') && !s.includes('gap:4px') && !s.includes('gap:5px')) return;
          const children = Array.from(el.children);
          if (children.length !== 2) return; // text + svg
          const hasBlueText = children.some(c => {
            const cs = c.getAttribute('style') || '';
            return cs.includes('color:#006BF4');
          });
          const hasIcon = children.some(c => c.tagName.toLowerCase() === 'svg');
          if (hasBlueText && hasIcon) el.classList.add('nx-link');
        });

        // ── Batch 7: "Scroll to view more" hint (2LH-0, 2TG-0) — bounce the arrow ──
        screen.querySelectorAll('div').forEach(el => {
          const s = el.getAttribute('style') || '';
          if (!s.includes('display:flex')) return;
          if (!s.includes('gap:4px')) return;
          if (!s.includes('align-items:center')) return;
          const txt = (el.textContent || '').trim();
          if (txt !== 'Scroll to view more') return;
          el.classList.add('nx-scroll-hint');
        });

        // ── Batch 5: in-flight loading spinners (25P-0, 20L-0) ──
        // Signature: SVG with a gray track circle + a blue arc path
        screen.querySelectorAll('svg').forEach(svg => {
          const circle = svg.querySelector('circle');
          const paths = svg.querySelectorAll('path');
          if (!circle || !paths.length) return;
          const trackColor = (circle.getAttribute('stroke') || '').toUpperCase();
          if (trackColor !== '#E8E8EA' && trackColor !== '#E8E8E7') return;
          const hasBlueArc = Array.from(paths).some(p => {
            const stroke = (p.getAttribute('stroke') || '').toUpperCase();
            return stroke === '#3D7BFF' || stroke === '#006BF4' || stroke === '#2C5BFF';
          });
          if (hasBlueArc) svg.classList.add('nx-spinner');
        });

        // ── Batch 6: in-flight step list rows (20L-0) — tag for stagger reveal ──
        // A step row is: align-items:center + display:flex + gap:12 + has a 22×22 status indicator child
        screen.querySelectorAll('div').forEach(el => {
          const s = el.getAttribute('style') || '';
          if (!s.includes('display:flex')) return;
          if (!s.includes('align-items:center')) return;
          if (!s.includes('gap:12px')) return;
          if (s.includes('padding-inline')) return; // exclude regular padded rows
          const hasStatus = Array.from(el.children).some(c => {
            const cs = c.getAttribute('style') || '';
            return cs.includes('width:22px') && cs.includes('height:22px');
          });
          if (hasStatus) el.classList.add('nx-step');
        });

        // ── Batch 6: success checkmark SVG (11W-0, 13M-0) — tag for stroke-draw animation ──
        screen.querySelectorAll('svg').forEach(svg => {
          const paths = svg.querySelectorAll('path');
          if (paths.length !== 1) return;
          const p = paths[0];
          const d = p.getAttribute('d') || '';
          const stroke = (p.getAttribute('stroke') || '').toUpperCase();
          // Checkmark pattern: M..L..L.. with 3 anchors, white stroke (inside a blue badge)
          if (stroke !== '#FFFFFE') return;
          if (!/^M[\d.\s]+L[\d.\s]+L[\d.\s]+$/.test(d.trim())) return;
          svg.classList.add('nx-check-wrap');
          p.classList.add('nx-check-path');
        });

        // ── Batch 6: big success amount (11W-0, 13M-0) — tag for count-up ──
        screen.querySelectorAll('div').forEach(el => {
          const s = el.getAttribute('style') || '';
          if (!s.includes('font-size:48px')) return;
          if (!s.includes('Delight-Regular')) return;
          const target = parseFloat((el.textContent || '').replace(/,/g, ''));
          if (isNaN(target)) return;
          el.dataset.nxTarget = String(target);
          el.dataset.nxDecimals = (el.textContent || '').includes('.') ? '2' : '0';
          el.classList.add('nx-countup');
        });

        // ── Batch 6: transaction history cards (184-0) — full-card hover ──
        screen.querySelectorAll('[style*="background-color:#FFFFFE"][style*="border-color:#E8E8E7"][style*="border-radius:14px"][style*="font-variant-numeric:tabular-nums"][style*="overflow:clip"]').forEach(el => el.classList.add('nx-tx-card'));

        // Filter tab container: bg #F0F0EF + border-radius 12 + padding-block 4 (the segmented control wrapper)
        screen.querySelectorAll('[style*="background-color:#F0F0EF"][style*="border-radius:12px"][style*="padding-block:4px"]').forEach(container => {
          Array.from(container.children).forEach(tab => {
            const ts = tab.getAttribute('style') || '';
            if (ts.includes('background-color:#FFFFFE')) return;
            tab.classList.add('nx-tab');
          });
        });
        // Search bar: white-bg rounded-14 with 1px border
        screen.querySelectorAll('[style*="background-color:#FFFFFE"][style*="border-radius:14px"][style*="height:56px"]').forEach(el => el.classList.add('nx-search'));
        screen.querySelectorAll('[style*="background-color:#FFFFFE"][style*="border-radius:14px"][style*="height:48px"]').forEach(el => el.classList.add('nx-search'));
        // Recently Used token chips: bg #F4F4F3 + border-radius 999
        screen.querySelectorAll('[style*="background-color:#F4F4F3"][style*="border-radius:999px"]').forEach(el => el.classList.add('nx-chip'));

        // ── Only show the X-delete on the active (being-typed-in) asset row ──
        // For each blinking cursor, walk up its ancestors until we hit one that
        // also contains an nx-xdel. That ancestor is the row; reveal its X.
        screen.querySelectorAll('.nx-cursor').forEach(cursor => {
          let node = cursor.parentElement;
          while (node && node !== screen) {
            const xdel = node.querySelector('.nx-xdel');
            if (xdel) { xdel.classList.add('nx-xdel-visible'); break; }
            node = node.parentElement;
          }
        });

        // ── Let the pill's right-section shrink to content ──
        // The "right section" of each asset row (pill + X) has an inline
        // width:142px reserving space for both. When X is display:none, that
        // leaves empty space to the right of the pill. Clear the explicit width
        // so the section sizes to its visible content and the pill ends up flush
        // against the row's right edge.
        screen.querySelectorAll('.nx-xdel').forEach(xdel => {
          const parent = xdel.parentElement;
          if (parent && /width:\d+px/.test(parent.getAttribute('style') || '')) {
            parent.style.width = 'auto';
          }
        });
}

    window._nxRunCountUps = (screen) => {
        screen.querySelectorAll('.nx-countup').forEach(el => {
          const target = parseFloat(el.dataset.nxTarget);
          const decimals = parseInt(el.dataset.nxDecimals || '0', 10);
          if (isNaN(target)) return;
          const t0 = performance.now();
          const dur = 900;
          function tick(now) {
            const t = Math.min(1, (now - t0) / dur);
            const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
            const v = target * eased;
            el.textContent = decimals > 0
              ? v.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',')
              : Math.round(v).toLocaleString();
            if (t < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        });
};
window._nxRunStepStagger = (screen) => {
        const steps = screen.querySelectorAll('.nx-step');
        steps.forEach((el, i) => {
          el.style.animation = 'none';
          // eslint-disable-next-line no-unused-expressions
          el.offsetHeight; // force reflow so animation restarts
          el.style.animation = '';
          el.style.animationDelay = (0.05 + i * 0.07) + 's';
        });
};


    // ─── DOM helpers (per-screen state binders & interaction wirers) ───
    const USABLE_BALANCE = 1240.55;

    function fmtAmount(n, d) {
      if (d == null) d = 2;
      return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function findActiveAmountEl(screen) {
      const cursor = screen.querySelector('.nx-cursor');
      if (!cursor) return null;
      const container = cursor.parentElement;
      if (!container) return null;
      for (const c of container.children) {
        if (c === cursor) continue;
        const t = (c.textContent || '').trim();
        if (/^[\d,]+(\.\d+)?$/.test(t)) return c;
      }
      return null;
    }
    function findActiveUsdEl(screen) {
      const cursor = screen.querySelector('.nx-cursor');
      if (!cursor) return null;
      let row = cursor.parentElement;
      let depth = 0;
      while (row && row !== screen && depth < 10) {
        const usd = Array.from(row.querySelectorAll('div')).find(d => /^≈ \$[\d,\.]+/.test((d.textContent || '').trim()));
        if (usd) return usd;
        row = row.parentElement;
        depth++;
      }
      return null;
    }

    // Replace the recipient text in any screen with the value from state.
    function bindRecipient(screen, recipient) {
      const recipientText = Array.from(screen.querySelectorAll('div')).find(d => {
        const t = (d.textContent || '').trim();
        return /^0x[a-fA-F\d…]+[a-fA-F\d]+$/.test(t) && d.children.length === 0;
      });
      if (recipientText && recipientText.textContent.trim() !== recipient) {
        recipientText.textContent = recipient;
      }
    }

    // Token category map for picker filtering.
    function tokenCategory(rowText) {
      const t = rowText.toLowerCase();
      if (/(^|\b)usdc|usdt/.test(t)) return 'stables';
      if (/(^|\b)eth\b|ethereum/.test(t)) return 'native';
      return 'other';
    }

    // Filter picker rows based on the active tab.
    function applyPickerFilter(screen, filter) {
      const rows = screen.querySelectorAll('.nx-row');
      rows.forEach(row => {
        const cat = tokenCategory(row.textContent || '');
        let show = true;
        if (filter === 'native' && cat !== 'native') show = false;
        else if (filter === 'stables' && cat !== 'stables') show = false;
        else if (filter === 'custom') show = false;
        row.style.display = show ? '' : 'none';
        // Hide separator immediately after a hidden row, for cleanliness
        const next = row.nextElementSibling;
        if (next && /^\s*$/.test(next.textContent || '') && (next.getAttribute('style') || '').includes('background-color:#F0F0EF')) {
          next.style.display = show ? '' : 'none';
        }
      });

      // Update the visually-active tab styling
      const tabContainer = screen.querySelector('[style*="background-color:#F0F0EF"][style*="border-radius:12px"][style*="padding-block:4px"]');
      if (!tabContainer) return;
      Array.from(tabContainer.children).forEach(tab => {
        const lbl = (tab.textContent || '').trim().toLowerCase();
        const innerText = Array.from(tab.querySelectorAll('div')).find(c => c.children.length === 0 && c.textContent.trim());
        // Match inactive tab height to active so there's no spillover above/below the pill
        tab.style.height = '40px';
        if (lbl === filter) {
          tab.style.backgroundColor = '#FFFFFE';
          tab.style.borderRadius = '9px';
          tab.style.boxShadow = '#1616150A 0px 1px 2px';
          if (innerText) {
            innerText.style.color = '#161615';
            innerText.style.fontFamily = '"Geist-SemiBold", "Geist", system-ui, sans-serif';
          }
        } else {
          tab.style.backgroundColor = '';
          tab.style.borderRadius = '';
          tab.style.boxShadow = '';
          if (innerText) {
            innerText.style.color = '#848483';
            innerText.style.fontFamily = '"Geist-Medium", "Geist", system-ui, sans-serif';
          }
        }
      });
    }

    // Find which slot a click element belongs to (send vs receive).
    function findSlotForElement(el) {
      const screen = el.closest ? el.closest('.screen') : null;
      if (!screen) return null;
      let node = el;
      while (node && node !== screen) {
        if (node.parentElement) {
          const labels = node.parentElement.querySelectorAll('div');
          for (const l of labels) {
            const t = (l.textContent || '').trim();
            if ((t === 'SEND' || t === 'RECEIVE') && l.children.length === 0) {
              // Confirm the label appears BEFORE el in the DOM
              if (l.compareDocumentPosition(el) & Node.DOCUMENT_POSITION_FOLLOWING) {
                return t.toLowerCase();
              }
            }
          }
        }
        node = node.parentElement;
      }
      return null;
    }
    window.findSlotForElement = findSlotForElement;

    // Inject/remove the inline fee or asset breakdown on the confirm screen.
    function setFeeExpansion(screen, kind, expanded) {
      // kind ∈ { 'fees', 'assets', 'priceImpact' }
      // Find the row by its label text
      const labelByKind = { fees: 'Total Fees', assets: 'You Swap', priceImpact: 'Price Impact' };
      const target = labelByKind[kind];
      if (!target) return;
      const labelEl = Array.from(screen.querySelectorAll('div')).find(d =>
        d.children.length === 0 && d.textContent.trim() === target
      );
      if (!labelEl) return;
      // Walk up to find the row (parent with padding-block:16px)
      let row = labelEl.parentElement;
      while (row && !((row.getAttribute('style') || '').includes('padding-block:16px')) && row !== screen) {
        row = row.parentElement;
      }
      if (!row || row === screen) return;

      // Remove any existing expansion for this row
      const next = row.nextElementSibling;
      if (next && next.classList.contains('nx-expansion')) next.remove();

      if (!expanded) return;

      // Add the new expansion. Inline `align-self: stretch` overrides the
      // host card's `align-items: center` so the expansion fills row width.
      const exp = document.createElement('div');
      exp.className = 'nx-expansion';
      exp.style.alignSelf = 'stretch';
      exp.style.width = '100%';
      if (kind === 'fees') {
        exp.innerHTML =
          '<div class="nx-expansion-row"><span>Execution Gas fee</span><span class="nx-val">$0.05</span></div>' +
          '<div class="nx-expansion-row"><span>Protocol fee</span><span class="nx-val">$0.00</span></div>' +
          '<div class="nx-expansion-row"><span>Solver fee</span><span class="nx-val">$0.001</span></div>' +
          '<div class="nx-expansion-row"><span>Gas sponsorship</span><span class="nx-val">$0.10</span></div>';
      } else if (kind === 'assets') {
        exp.innerHTML =
          '<div class="nx-expansion-asset"><span class="nx-ea-sym">USDC</span><span class="nx-ea-chain">Arbitrum</span><span class="nx-ea-amt">250 USDC</span><span class="nx-ea-usd">$250.50</span></div>' +
          '<div class="nx-expansion-asset"><span class="nx-ea-sym">ETH</span><span class="nx-ea-chain">Optimism</span><span class="nx-ea-amt">0.435 ETH</span><span class="nx-ea-usd">$150.50</span></div>';
      } else if (kind === 'priceImpact') {
        exp.innerHTML =
          '<div class="nx-expansion-row"><span>Swap impact</span><span class="nx-val" style="color:#1F8A4F">−0.04%</span></div>' +
          '<div class="nx-expansion-row"><span>Max. slippage</span><span class="nx-val">Auto</span></div>' +
          '<div class="nx-expansion-row"><span>Min. received</span><span class="nx-val">11.18 USDT</span></div>';
      }
      row.insertAdjacentElement('afterend', exp);

      // Flip the chevron in this row's "View Details" link, and rename it
      const link = row.querySelector('.nx-link');
      if (link) {
        const textEl = Array.from(link.children).find(c => c.tagName === 'DIV' && c.children.length === 0);
        if (textEl) textEl.textContent = expanded ? 'Hide Details' : 'View Details';
        const svg = link.querySelector('svg');
        if (svg) {
          svg.style.transform = expanded ? 'rotate(180deg)' : '';
          svg.style.transition = 'transform 0.18s ease';
        }
      }
    }

    // Reveal in-flight step rows based on the current step count.
    // Sequence:
    //   step 0: only "Verifying intent" visible
    //   step 1: + "Source signature verified"
    //   step 2: + "Liquidity intent confirmed"
    //   step 3: + "Cross-chain proof failed" (red X, retrying)
    //   step 4: morph the failed row to "verified" (blue check)
    function applyInflightStep(screen, step) {
      // No-op if the same step is being applied — avoids re-touching styles
      // on every render and the resulting visible flicker.
      if (screen.dataset.nxStepApplied === String(step)) return;
      screen.dataset.nxStepApplied = String(step);

      const rows = Array.from(screen.querySelectorAll('.nx-step'));
      if (rows.length < 5) return;
      const setVisible = (el, on) => {
        el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        el.style.opacity = on ? '1' : '0';
        el.style.transform = on ? 'translateY(0)' : 'translateY(8px)';
      };
      // Hide "Deposit transaction" entirely (not part of animated sequence)
      rows[1].style.display = 'none';

      setVisible(rows[0], true);                  // Verifying intent
      setVisible(rows[3], step >= 1);             // Source signature verified
      setVisible(rows[4], step >= 2);             // Liquidity intent confirmed
      setVisible(rows[2], step >= 3);             // Cross-chain proof failed

      if (step >= 4) {
        // Morph the cross-chain row from "failed (red X)" to "verified (blue check)"
        const failedRow = rows[2];
        const statusBg = Array.from(failedRow.querySelectorAll('div')).find(d => {
          const s = d.getAttribute('style') || '';
          return s.includes('background-color:#DC2F2A') && s.includes('border-radius:999px');
        });
        if (statusBg) {
          statusBg.style.transition = 'background-color 0.4s ease';
          statusBg.style.backgroundColor = '#3D7BFF';
          const svg = statusBg.querySelector('svg');
          if (svg) svg.innerHTML = '<path d="M2.5 6L5 8.5L9.5 4" stroke="#FFFFFE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />';
        }
        const titleEl = Array.from(failedRow.querySelectorAll('div')).find(d => d.children.length === 0 && /Cross-chain proof failed/.test(d.textContent));
        if (titleEl) titleEl.textContent = 'Cross-chain proof verified';
        const subEl = Array.from(failedRow.querySelectorAll('div')).find(d => d.children.length === 0 && /Retrying/.test(d.textContent));
        if (subEl) {
          subEl.style.transition = 'color 0.4s ease';
          subEl.style.color = '#848483';
          subEl.textContent = 'Confirmed · just now';
        }
      }
    }

    // Wire 25/50/75/MAX onto the active amount + USD line, and dispatch SET_AMOUNT.
    function wirePercentageButtons(screen, dispatch) {
      const buttons = screen.querySelectorAll('.nx-pct, .nx-max');
      buttons.forEach(btn => {
        const lbl = (btn.textContent || '').trim();
        const pct = lbl === 'MAX' ? 1.0 : lbl === '75%' ? 0.75 : lbl === '50%' ? 0.50 : lbl === '25%' ? 0.25 : null;
        if (pct == null) return;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const value = USABLE_BALANCE * pct;
          if (dispatch) dispatch({ type: 'SET_AMOUNT', amount: fmtAmount(value) });
          // Immediate visual update (state-driven update will reinforce)
          const amountEl = findActiveAmountEl(screen);
          const usdEl = findActiveUsdEl(screen);
          if (amountEl) amountEl.textContent = fmtAmount(value);
          if (usdEl) usdEl.textContent = '≈ $' + fmtAmount(value);
        });
      });
    }

    // Wire Edit pill to inline-editable recipient.
    function wireRecipientEdit(screen, dispatch) {
      const editPills = Array.from(screen.querySelectorAll('div')).filter(el => {
        const style = el.getAttribute('style') || '';
        return style.includes('#E8F0FF') && style.includes('border-radius:999px') && /Edit/.test(el.textContent.trim());
      });
      const recipientText = Array.from(screen.querySelectorAll('div')).find(d => {
        const t = (d.textContent || '').trim();
        return /^0x[a-fA-F\d…]+[a-fA-F\d]+$/.test(t) && d.children.length === 0;
      });
      if (!recipientText) return;
      let original = recipientText.textContent;
      editPills.forEach(pill => {
        pill.addEventListener('click', (e) => {
          e.stopPropagation();
          if (recipientText.classList.contains('nx-editing')) return;
          original = recipientText.textContent;
          recipientText.contentEditable = 'true';
          recipientText.classList.add('nx-editing');
          recipientText.focus();
          const range = document.createRange();
          range.selectNodeContents(recipientText);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        });
      });
      const finish = (save) => {
        recipientText.classList.remove('nx-editing');
        recipientText.contentEditable = 'false';
        const newVal = recipientText.textContent.trim();
        if (!save || !newVal) {
          recipientText.textContent = original;
        } else if (dispatch) {
          dispatch({ type: 'SET_RECIPIENT', recipient: newVal });
        }
      };
      recipientText.addEventListener('blur', () => finish(true));
      recipientText.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); recipientText.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); finish(false); recipientText.blur(); }
      });
    }

    // Wire picker tab clicks → dispatch SET_PICKER_FILTER
    function wirePickerTabs(screen, dispatch) {
      const tabContainer = screen.querySelector('[style*="background-color:#F0F0EF"][style*="border-radius:12px"][style*="padding-block:4px"]');
      if (!tabContainer) return;
      Array.from(tabContainer.children).forEach(tab => {
        const label = (tab.textContent || '').trim().toLowerCase();
        if (!['all', 'native', 'stables', 'custom'].includes(label)) return;
        tab.addEventListener('click', (e) => {
          e.stopPropagation();
          if (dispatch) dispatch({ type: 'SET_PICKER_FILTER', filter: label });
        });
      });
    }

    // Wire View Details / Hide Details clicks → dispatch toggle
    function wireDetailsLinks(screen, dispatch) {
      const links = screen.querySelectorAll('.nx-link');
      links.forEach(link => {
        const initialText = (link.textContent || '').trim();
        if (initialText !== 'View Details' && initialText !== 'Hide Details') return;
        link.addEventListener('click', (e) => {
          e.stopPropagation();
          // Determine which row this is by looking at the row label
          let row = link.parentElement;
          while (row && !((row.getAttribute('style') || '').includes('padding-block:16px')) && row !== screen) {
            row = row.parentElement;
          }
          if (!row) return;
          const labelEl = Array.from(row.querySelectorAll('div')).find(d => d.children.length === 0 && d.textContent.trim().length < 30);
          const label = labelEl ? labelEl.textContent.trim() : '';
          let kind = null;
          if (/Total Fees/.test(label) || /Total Fees/.test(row.textContent)) kind = 'fees';
          else if (/You Swap/.test(label) || /You Swap/.test(row.textContent)) kind = 'assets';
          else if (/Price Impact/.test(label) || /Price Impact/.test(row.textContent)) kind = 'priceImpact';
          if (kind && dispatch) dispatch({ type: 'TOGGLE_DETAILS', kind });
        });
      });
    }

    window._nxApplyScreenState = function(screen, id, state, dispatch) {
      // Tag (idempotent — adds classes only if not yet present)
      try { tagScreenInteractive(screen); } catch (e) {}
      try { window._nxRunCountUps && window._nxRunCountUps(screen); } catch (e) {}
      try { window._nxRunStepStagger && window._nxRunStepStagger(screen); } catch (e) {}

      // ── Wire interactions (idempotent: only attach once per element via dataset flag)
      const wireOnce = (el, attr, fn) => {
        if (!el || el.dataset[attr]) return;
        el.dataset[attr] = '1';
        fn(el);
      };
      wireOnce(screen, 'wired', (s) => {
        wirePercentageButtons(s, dispatch);
        wireRecipientEdit(s, dispatch);
        wirePickerTabs(s, dispatch);
        wireDetailsLinks(s, dispatch);
      });

      // ── Apply state ─────────────────────────────────────────────
      if (state.recipient) bindRecipient(screen, state.recipient);

      // Per-screen state bindings
      const isPicker = ['YC-0', '1QQ-0', '1N1-0', '1US-0'].includes(id);
      if (isPicker && state.pickerFilter) {
        applyPickerFilter(screen, state.pickerFilter);
      }

      const isMultiAsset = ['30R-0', '1-0', 'GK-0', '2PX-0', '2TG-0', '2LH-0'].includes(id);
      if (isMultiAsset && state.amount && state.amount !== '0') {
        const amountEl = findActiveAmountEl(screen);
        const usdEl = findActiveUsdEl(screen);
        if (amountEl) amountEl.textContent = state.amount;
        if (usdEl) usdEl.textContent = '≈ $' + state.amount;
      }

      const isConfirm = ['1DB-0', '1FN-0', '1I6-0'].includes(id);
      if (isConfirm) {
        // Remove any existing expansions, then re-add per state
        screen.querySelectorAll('.nx-expansion').forEach(e => e.remove());
        if (state.detailsExpanded === 'fees') setFeeExpansion(screen, 'fees', true);
        else if (state.detailsExpanded === 'assets') setFeeExpansion(screen, 'assets', true);
        else if (state.detailsExpanded === 'priceImpact') setFeeExpansion(screen, 'priceImpact', true);
      }

      const isPending = id === '20L-0';
      if (isPending && state.pendingStep != null) {
        applyInflightStep(screen, state.pendingStep);
      }

      // ── Design refinements (idempotent visual polish across screens) ──
      try { applyDesignRefinements(screen, id); } catch (e) { console.warn('refinements:', e); }
    };

    // ─────────────────────────────────────────────────────────────
    // Design refinements (post-mount visual polish)
    // ─────────────────────────────────────────────────────────────
    function applyDesignRefinements(screen, id) {
      // ── Big numeric amounts (28px / 32px Geist with tabular-nums) bumped to medium weight ──
      //    Targets the large amount text in every asset row + the RECEIVE amount.
      //    Leaves the smaller "≈ $X" lines and Delight success digits alone.
      Array.from(screen.querySelectorAll('div')).forEach(el => {
        if (el.children.length !== 0) return;
        const s = el.getAttribute('style') || '';
        if (!s.includes('tabular-nums')) return;
        if (!/font-size:(28|32)px/.test(s)) return;
        el.style.fontFamily = '"Geist-Medium", "Geist", system-ui, sans-serif';
        el.style.fontWeight = '500';
      });

      // ── 2. Fix RECEIVE USD estimate on multi-asset screens ──
      //    The hardcoded "≈ $500.50" in the RECEIVE card doesn't match the
      //    displayed 400.50 USDT amount. Coerce it to match (1 USDT ≈ $1).
      if (['1-0', '30R-0', 'GK-0', '2PX-0', '2TG-0', '2LH-0'].includes(id)) {
        const receiveLabel = Array.from(screen.querySelectorAll('div')).find(d =>
          d.children.length === 0 && d.textContent.trim() === 'RECEIVE'
        );
        if (receiveLabel) {
          let card = receiveLabel.parentElement;
          let hop = 0;
          while (card && hop++ < 6 && !((card.getAttribute('style') || '').includes('border-radius:14px'))) {
            card = card.parentElement;
          }
          if (card) {
            const amtBig = Array.from(card.querySelectorAll('div')).find(d =>
              d.children.length === 0 && /^[\d,]+(\.\d+)?$/.test((d.textContent || '').trim())
            );
            const target = amtBig ? amtBig.textContent.trim() : '400.50';
            Array.from(card.querySelectorAll('div')).forEach(d => {
              if (d.children.length !== 0) return;
              if (/^≈ \$500\.50$/.test((d.textContent || '').trim())) {
                d.textContent = '≈ $' + target;
              }
            });
          }
        }
      }

      // ── 7. Increase letter-spacing on SEND/RECEIVE/RECIPIENT labels ──
      Array.from(screen.querySelectorAll('div')).forEach(d => {
        if (d.children.length !== 0) return;
        const t = (d.textContent || '').trim();
        if (t === 'SEND' || t === 'RECEIVE' || t === 'RECIPIENT') {
          d.style.letterSpacing = '0.14em';
        }
      });

      // ── 8. Tooltip on ↕ toggle icons next to USD values ──
      screen.querySelectorAll('svg').forEach(svg => {
        const paths = svg.querySelectorAll('path');
        if (paths.length !== 2) return;
        // Both paths shaped like vertical strokes with arrow heads (toggle icon)
        const ds = Array.from(paths).map(p => p.getAttribute('d') || '');
        if (!ds.every(d => /M[\d.]+\s+[\d.]+[VL]/.test(d))) return;
        const parent = svg.parentElement;
        if (parent && !parent.getAttribute('title')) {
          parent.setAttribute('title', 'Toggle USD / token display');
          parent.style.cursor = 'help';
        }
      });

      // ── 6. Cap chain badges at ≤40% of their parent token icon ──
      //    The success-screen checkmark badge (blue circle with white check
      //    inside) lives on a 64px token icon and looks oversized — shrink
      //    it further to ~25% (16px) so the icon reads as the primary mark.
      Array.from(screen.querySelectorAll('div')).forEach(badge => {
        const style = badge.getAttribute('style') || '';
        if (!style.includes('position:absolute')) return;
        if (!style.includes('border-radius:999px')) return;
        if (!/bottom:\s*-?\d/.test(style)) return;
        if (!/right:\s*-?\d/.test(style)) return;
        const parent = badge.parentElement;
        if (!parent) return;
        const parentStyle = parent.getAttribute('style') || '';
        const pw = parseInt((parentStyle.match(/width:(\d+)px/) || [])[1], 10);
        if (!pw) return;
        const cw = parseInt((style.match(/width:(\d+)px/) || [])[1], 10);
        if (!cw) return;
        const isSuccessCheck = style.includes('background-color:#006BF4') &&
                               !!badge.querySelector('svg path[stroke="#FFFFFE"]');
        // Paper exact: success-check badge is 26px on a 64px token icon
        // (ratio ≈ 0.406). Other badges (chain markers) stay at 0.4.
        const ratio = isSuccessCheck ? 0.406 : 0.4;
        const maxSize = Math.floor(pw * ratio);
        if (cw > maxSize) {
          badge.style.width = maxSize + 'px';
          badge.style.height = maxSize + 'px';
          if (isSuccessCheck) {
            // Paper uses a 2.5px white ring around the success-check badge
            badge.style.borderWidth = '2.5px';
          }
          const inner = badge.firstElementChild;
          if (inner) {
            if (isSuccessCheck && inner.tagName.toLowerCase() === 'svg') {
              // Paper: SVG inside the success check is 12px on a 26px badge
              // ≈ 0.46 — leaves a comfortable inner padding around the tick.
              const svgSize = Math.floor(maxSize * 0.46);
              inner.style.width = svgSize + 'px';
              inner.style.height = svgSize + 'px';
              inner.setAttribute('width', svgSize);
              inner.setAttribute('height', svgSize);
            } else {
              inner.style.width = maxSize + 'px';
              inner.style.height = maxSize + 'px';
            }
          }
        }
      });

      // ── 4. Clean up the "5 assets · Scroll to view more" summary row ──
      //    Smaller icon stack (20px, 8px overlap), hide chain badges,
      //    add a subtle separator line above the row.
      if (['2LH-0', '2TG-0'].includes(id)) {
        const scrollMore = Array.from(screen.querySelectorAll('div')).find(d =>
          d.children.length === 0 && d.textContent.trim() === 'Scroll to view more'
        );
        if (scrollMore) {
          // Walk up to the row container (a flex with space-between)
          let row = scrollMore.parentElement;
          while (row && row !== screen) {
            const s = row.getAttribute('style') || '';
            if (s.includes('display:flex') && s.includes('justify-content:space-between')) break;
            row = row.parentElement;
          }
          if (row && row !== screen) {
            // Shrink icons inside this row from 22 → 20px, with -8px stagger
            const icons = row.querySelectorAll('div[style*="width:22px"][style*="height:22px"][style*="position:relative"]');
            icons.forEach((icon, i) => {
              icon.style.width = '20px';
              icon.style.height = '20px';
              if (i > 0) icon.style.marginLeft = '-12px'; // 20-8 = 12 overlap
              // Hide chain badge
              Array.from(icon.children).forEach(c => {
                const cs = c.getAttribute('style') || '';
                if (cs.includes('position:absolute') && cs.includes('bottom:')) {
                  c.style.display = 'none';
                }
              });
              // Resize inner icon
              const inner = icon.querySelector('div[style*="background-image"]');
              if (inner) {
                inner.style.width = '20px';
                inner.style.height = '20px';
              }
            });
            // Subtle separator above the row
            if (!row.previousElementSibling || !row.previousElementSibling.classList.contains('nx-summary-sep')) {
              const sep = document.createElement('div');
              sep.className = 'nx-summary-sep';
              sep.style.cssText = 'background-color:#ECECEA;height:1px;width:100%;margin-bottom:10px;align-self:stretch';
              row.insertAdjacentElement('beforebegin', sep);
            }
          }
        }
      }

      // ── 9, 10, 11, 12, 14, 15: Picker refinements ──
      if (['YC-0', '1QQ-0', '1N1-0', '1US-0'].includes(id)) {
        refinePickerRows(screen);
      }

      // ── Strip the top "Swap" chrome bar from picker overlays ──
      // Picker screens (used only as bottom-sheet overlays) include the
      // file-level Swap header with the refresh + X icons. The host screen
      // already shows that chrome, so the overlay must not duplicate it.
      if (['YC-0', '1QQ-0', '1N1-0', '1US-0', '1KX-0'].includes(id)) {
        stripPickerChromeHeader(screen);
      }
    }

    // Hide the top "Swap" chrome bar in a picker overlay screen so the slide-in
    // only shows the picker card (Choose asset / search / tabs / list / Done).
    function stripPickerChromeHeader(screen) {
      if (screen.dataset.nxHeaderStripped === '1') return;
      // The header is the first child of the root that contains the literal
      // text "Swap" and a row with the refresh + X icons (opacity:0.45 in JSX).
      const root = screen.firstElementChild;
      if (!root) return;
      const firstChild = root.firstElementChild;
      if (!firstChild) return;
      const style = firstChild.getAttribute('style') || '';
      const hasOpacity45 = /opacity:\s*0\.45/.test(style);
      const hasSwapText = /(^|\s)Swap(\s|$)/.test(firstChild.textContent || '');
      if (hasOpacity45 || hasSwapText) {
        firstChild.style.display = 'none';
        screen.dataset.nxHeaderStripped = '1';
      }
    }

    // Completely rebuild each picker row's innerHTML into a clean horizontal layout.
    // Target structure (64px tall, single row):
    //   [32px icon] | [name bold + chain small grey stacked] | …spacer… | [balance bold + USD small grey stacked] | [24px radio]
    function refinePickerRows(screen) {
      const rows = screen.querySelectorAll('.nx-row');
      rows.forEach(row => {
        if (row.dataset.nxRebuilt === '1') return; // idempotent
        const data = extractPickerRowData(row);
        if (!data) return;
        row.innerHTML = renderPickerRow(data);
        // Paper: same #FFFFFE bg for selected & unselected. Only the radio changes.
        // No blue left-edge bar, no tinted row background.
        row.style.cssText =
          'padding:0;align-self:stretch;display:block;box-sizing:border-box;background-color:#FFFFFE;';
        row.dataset.nxRebuilt = '1';
        if (data.selected) row.classList.add('nx-row-selected');
      });
    }

    // Extract the data from the existing row's DOM so we can rebuild it cleanly.
    function extractPickerRowData(row) {
      // Token icon: the first div with a background-image whose width is large
      // enough to be a token icon (≥24px) — this skips the tiny chain badges.
      const tokenImgEl = Array.from(row.querySelectorAll('div')).find(d => {
        const s = d.getAttribute('style') || '';
        if (!s.includes('background-image:url')) return false;
        const w = (s.match(/width:(\d+)px/) || [])[1];
        return w != null && parseInt(w, 10) >= 24;
      });
      const iconUrl = tokenImgEl
        ? (((tokenImgEl.getAttribute('style') || '').match(/background-image:url\(([^)]+)\)/) || [])[1] || null)
        : null;

      // Walk leaf text nodes and classify them.
      const leaves = Array.from(row.querySelectorAll('div')).filter(d => d.children.length === 0);
      let tokenSymbol = '';
      let chainText = '';
      let balance = '';
      let usd = '';
      let hasUnified = false;

      for (const el of leaves) {
        const t = (el.textContent || '').trim();
        if (!t) continue;
        if (!tokenSymbol && /^[A-Z]{2,5}$/.test(t)) { tokenSymbol = t; continue; }
        if (!hasUnified && t === 'UNIFIED') { hasUnified = true; continue; }
        if (!balance && /^[\d,]+(\.\d+)? [A-Z]{2,6}$/.test(t)) { balance = t; continue; }
        if (!usd && /^≈ \$/.test(t)) { usd = t; continue; }
        if (!usd && /^\$[\d,]+(\.\d+)?$/.test(t)) { usd = '≈ ' + t; continue; }
        if (!chainText && /(^\d+ chains?$)|(^\+\d+ chains?$)|(^on [A-Z][a-z]+$)/.test(t)) { chainText = t.replace(/^on /, ''); continue; }
        if (!chainText && /^[A-Z][a-z]+$/.test(t)) { chainText = t; continue; }
      }

      // Selected: the radio dot has a thick blue border (the "filled" indicator).
      const radio = Array.from(row.querySelectorAll('div')).find(d => {
        const s = d.getAttribute('style') || '';
        return s.includes('width:18px') && s.includes('height:18px') &&
               s.includes('border-radius:999px') && s.includes('border-style:solid');
      });
      const radioStyle = radio ? (radio.getAttribute('style') || '') : '';
      const selected = radioStyle.includes('border-color:#006BF4') && /border-width:[3-9]px/.test(radioStyle);

      if (!tokenSymbol && !iconUrl) return null;
      return { tokenSymbol, chainText, balance, usd, iconUrl, hasUnified, selected };
    }

    // Render the row HTML from extracted data.
    function renderPickerRow(d) {
      const esc = (s) => (s || '').replace(/</g, '&lt;');
      const unifiedBadge = d.hasUnified
        ? '<span style="background:#E3EEFF;color:#006BF4;font-family:\'Geist-SemiBold\',\'Geist\',system-ui;font-size:11px;font-weight:600;letter-spacing:0.06em;line-height:14px;padding:2px 8px;border-radius:100px;text-transform:uppercase">Unified</span>'
        : '';
      const iconBg = d.iconUrl
        ? `background-image:url(${d.iconUrl});background-position:50%;background-repeat:no-repeat;background-size:100% 100%;`
        : 'background:#F0F0EF;';
      // Match Paper exactly: 18px radio on the LEFT, thin gray ring when
      // unselected, thick blue ring (≈ filled disc) when selected.
      const radioRing = d.selected
        ? 'background:#FFFFFE;border:5px solid #006BF4;'
        : 'background:#FFFFFE;border:1.5px solid #E8E8E7;';
      // Match Paper exactly: paddingBlock 16px, paddingInline 16px, gap 12px,
      // 36px icon, 16px/24px name & balance, 14px/20px chain & USD.
      return [
        '<div style="display:flex;align-items:center;gap:12px;width:100%;padding:16px;box-sizing:border-box">',
          `<div style="flex-shrink:0;width:18px;height:18px;border-radius:999px;${radioRing}box-sizing:border-box"></div>`,
          `<div style="flex-shrink:0;width:36px;height:36px;border-radius:999px;overflow:hidden;${iconBg}"></div>`,
          '<div style="display:flex;flex-direction:column;flex:1;gap:2px;min-width:0">',
            '<div style="display:flex;align-items:center;gap:8px">',
              `<span style="color:#161615;font-family:\'Geist-Medium\',\'Geist\',system-ui;font-size:16px;font-weight:500;line-height:24px">${esc(d.tokenSymbol)}</span>`,
              unifiedBadge,
            '</div>',
            `<div style="color:#848483;font-family:\'Geist-Regular\',\'Geist\',system-ui;font-size:14px;line-height:20px">${esc(d.chainText)}</div>`,
          '</div>',
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">',
            `<div style="color:#161615;font-family:\'Geist-Medium\',\'Geist\',system-ui;font-size:16px;font-weight:500;line-height:24px;font-variant-numeric:tabular-nums">${esc(d.balance)}</div>`,
            `<div style="color:#848483;font-family:\'Geist-Regular\',\'Geist\',system-ui;font-size:14px;line-height:20px;font-variant-numeric:tabular-nums">${esc(d.usd)}</div>`,
          '</div>',
        '</div>'
      ].join('');
    }
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo, useReducer } = React;

    // ─────────────────────────────────────────────────────────────
    // State machine
    // ─────────────────────────────────────────────────────────────

    const MODE_SCREEN = {
      empty:      '3H-0',
      oneAsset:   '30R-0',
      twoAssets:  '1-0',
      overflow:   '2LH-0',
      confirm:    '1DB-0',
      pending:    '20L-0',
      success:    '11W-0',
      history:    '184-0',
    };

    const OVERLAY_SCREEN = {
      assetPickerSend:    'YC-0',
      assetPickerReceive: '1N1-0',
      chainPicker:        '1KX-0',
    };

    const initialState = {
      mode: 'empty',
      overlay: null,
      sendAssets: [],
      receiveAsset: { symbol: 'USDT', chain: 'arb' },
      amount: '0',
      recipient: '0xF3a1…9b2E',
      pickerFilter: 'all',
      pickerSlot: null,           // 'send' or 'receive' — remembered when opening picker
      detailsExpanded: null,      // null | 'fees' | 'assets' | 'priceImpact'
      pendingStep: 0,             // 0..4
      transitionKind: 'slide',    // 'slide' | 'fade'
    };

    function modeFromSendAssets(len) {
      if (len === 0) return 'empty';
      if (len === 1) return 'oneAsset';
      if (len === 2) return 'twoAssets';
      return 'overflow';
    }

    function reducer(state, action) {
      switch (action.type) {
        case 'SET_MODE':
          return { ...state, mode: action.mode, overlay: null, transitionKind: 'slide' };
        case 'OPEN_OVERLAY':
          return { ...state, overlay: action.overlay, pickerSlot: action.slot || state.pickerSlot, transitionKind: 'fade' };
        case 'CLOSE_OVERLAY':
          return { ...state, overlay: null, transitionKind: 'fade' };
        case 'ADD_ASSET': {
          const next = [...state.sendAssets, action.asset];
          return { ...state, sendAssets: next, mode: modeFromSendAssets(next.length), overlay: null, transitionKind: 'slide' };
        }
        case 'REMOVE_ASSET': {
          const next = state.sendAssets.filter((_, i) => i !== action.idx);
          return { ...state, sendAssets: next, mode: modeFromSendAssets(next.length), transitionKind: 'slide' };
        }
        case 'SET_RECEIVE_ASSET':
          return { ...state, receiveAsset: action.asset, overlay: null, transitionKind: 'fade' };
        case 'SET_AMOUNT':
          return { ...state, amount: action.amount };
        case 'SET_RECIPIENT':
          return { ...state, recipient: action.recipient };
        case 'SET_PICKER_FILTER':
          return { ...state, pickerFilter: action.filter };
        case 'TOGGLE_DETAILS': {
          const next = state.detailsExpanded === action.kind ? null : action.kind;
          return { ...state, detailsExpanded: next };
        }
        case 'ADVANCE_PENDING':
          return { ...state, pendingStep: Math.min(state.pendingStep + 1, 4) };
        case 'SET_PENDING_STEP':
          return { ...state, pendingStep: action.step };
        case 'GO_CONFIRM':
          return { ...state, mode: 'confirm', overlay: null, detailsExpanded: null, transitionKind: 'slide' };
        case 'GO_PENDING':
          return { ...state, mode: 'pending', overlay: null, pendingStep: 0, transitionKind: 'slide' };
        case 'GO_SUCCESS':
          return { ...state, mode: 'success', overlay: null, transitionKind: 'slide' };
        case 'RESET':
          return { ...initialState, recipient: state.recipient };
        default:
          return state;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Screen + 22 named components
    // ─────────────────────────────────────────────────────────────

    function Screen({ id, state, dispatch }) {
      const ref = useRef(null);

      // Re-apply DOM mutations only when the inputs that drive them change —
      // not after every dispatch. Re-running on every render caused visible
      // flicker on the pending screen because applyInflightStep + design
      // refinements would re-touch the same nodes 5×/sec.
      useEffect(() => {
        if (!ref.current) return;
        window._nxApplyScreenState(ref.current, id, state, dispatch);
      }, [
        id,
        state.mode,
        state.overlay,
        state.sendAssets,
        state.receiveAsset,
        state.amount,
        state.recipient,
        state.pickerFilter,
        state.detailsExpanded,
        state.pendingStep,
        dispatch,
      ]);

      const handleClick = useCallback((e) => {
        const node = e.target.closest('div, button, a, span');
        if (!node) return;
        const text = (node.textContent || '').trim();
        if (text.length === 0 || text.length > 80) return;

        // ── Navigation triggers ──
        if (text === 'Review swap' || text === 'Confirm swap') {
          dispatch({ type: 'GO_CONFIRM' });
        } else if (text === 'Swap now') {
          dispatch({ type: 'GO_PENDING' });
        } else if (text === 'Done') {
          // Two contexts:
          //   in picker → close + add an asset to the appropriate slot
          //   on success → reset
          if (state.overlay === 'assetPickerSend' || state.overlay === 'assetPickerSendUnified') {
            // Add a sensible default asset (deterministic for demo)
            const newAsset = pickDefaultSendAsset(state.sendAssets.length);
            dispatch({ type: 'ADD_ASSET', asset: newAsset });
          } else if (state.overlay === 'assetPickerReceive' || state.overlay === 'assetPickerReceiveInfo') {
            dispatch({ type: 'SET_RECEIVE_ASSET', asset: { symbol: 'USDT', chain: 'arb' } });
          } else if (state.overlay === 'chainPicker') {
            dispatch({ type: 'CLOSE_OVERLAY' });
          } else if (state.mode === 'success') {
            dispatch({ type: 'RESET' });
          } else {
            dispatch({ type: 'CLOSE_OVERLAY' });
          }
        } else if (text === '+ Add asset' || text === 'Add asset') {
          dispatch({ type: 'OPEN_OVERLAY', overlay: 'assetPickerSend', slot: 'send' });
        } else if (text === 'Select asset' || text === '+ Select asset' || text === 'Assets' || text === '+ Assets') {
          const slot = window.findSlotForElement ? window.findSlotForElement(node) : 'send';
          if (slot === 'receive') {
            dispatch({ type: 'OPEN_OVERLAY', overlay: 'assetPickerReceive', slot: 'receive' });
          } else {
            dispatch({ type: 'OPEN_OVERLAY', overlay: 'assetPickerSend', slot: 'send' });
          }
        }
      }, [state, dispatch]);

      return (
        <section
          ref={ref}
          className="screen active"
          data-screen={id}
          onClick={handleClick}
          dangerouslySetInnerHTML={{ __html: SCREENS[id] }}
        />
      );
    }

    // Pick a default asset to add based on how many already exist.
    function pickDefaultSendAsset(count) {
      const palette = [
        { symbol: 'ETH',  chain: 'op',  amount: '0.05' },
        { symbol: 'USDC', chain: 'arb', amount: '250'  },
        { symbol: 'USDT', chain: 'op',  amount: '100'  },
        { symbol: 'USDC', chain: 'base',amount: '180'  },
        { symbol: 'ETH',  chain: 'base',amount: '0.05' },
      ];
      return palette[count % palette.length];
    }

    // The 22 named screens (preserved for browsing via the dev toolbar)
    const SwapEmpty              = (p) => <Screen id="3H-0" {...p} />;
    const SwapEmptyVariantB      = (p) => <Screen id="4X-0" {...p} />;
    const SwapEmptyVariantC      = (p) => <Screen id="7G-0" {...p} />;
    const MultiAssetSingle       = (p) => <Screen id="30R-0" {...p} />;
    const MultiAssetTwoFilled    = (p) => <Screen id="1-0" {...p} />;
    const MultiAssetTwoVariant   = (p) => <Screen id="GK-0" {...p} />;
    const AssetPickerSend        = (p) => <Screen id="YC-0" {...p} />;
    const AssetPickerSendUnified = (p) => <Screen id="1QQ-0" {...p} />;
    const AssetPickerReceive     = (p) => <Screen id="1N1-0" {...p} />;
    const AssetPickerReceiveInfo = (p) => <Screen id="1US-0" {...p} />;
    const ChainPicker            = (p) => <Screen id="1KX-0" {...p} />;
    const ConfirmSwap            = (p) => <Screen id="1DB-0" {...p} />;
    const ConfirmSwapFeesDetail  = (p) => <Screen id="1FN-0" {...p} />;
    const ConfirmSwapAssetsDetail= (p) => <Screen id="1I6-0" {...p} />;
    const SwapPending            = (p) => <Screen id="25P-0" {...p} />;
    const SwapPendingExpanded    = (p) => <Screen id="20L-0" {...p} />;
    const SwapComplete           = (p) => <Screen id="11W-0" {...p} />;
    const SwapCompleteMultiAsset = (p) => <Screen id="13M-0" {...p} />;
    const TransactionHistory     = (p) => <Screen id="184-0" {...p} />;
    const MultiAssetVariant      = (p) => <Screen id="2PX-0" {...p} />;
    const MultiAssetViewAll      = (p) => <Screen id="2TG-0" {...p} />;
    const MultiAssetOverflow     = (p) => <Screen id="2LH-0" {...p} />;

    // ─────────────────────────────────────────────────────────────
    // Dev toolbar
    // ─────────────────────────────────────────────────────────────

    function DevBar({ state, dispatch }) {
      const modeBtn = (mode, label) => (
        <button
          key={mode}
          className={'devbar-btn' + (state.mode === mode ? ' active' : '')}
          onClick={() => dispatch({ type: 'SET_MODE', mode })}
        >
          {label}
        </button>
      );
      const overlayBtn = (ov, label, slot) => (
        <button
          key={ov}
          className={'devbar-btn' + (state.overlay === ov ? ' active' : '')}
          onClick={() => dispatch({ type: 'OPEN_OVERLAY', overlay: ov, slot })}
        >
          {label}
        </button>
      );
      return (
        <div className="devbar">
          <div className="devbar-group">
            <span className="devbar-label">Mode</span>
            {modeBtn('empty', 'Empty')}
            {modeBtn('oneAsset', '1 Asset')}
            {modeBtn('twoAssets', '2 Assets')}
            {modeBtn('overflow', '5+ Assets')}
            {modeBtn('confirm', 'Confirm')}
            {modeBtn('pending', 'Pending')}
            {modeBtn('success', 'Success')}
            {modeBtn('history', 'History')}
          </div>
          <div className="devbar-group">
            <span className="devbar-label">Overlay</span>
            {overlayBtn('assetPickerSend', 'Source Picker', 'send')}
            {overlayBtn('assetPickerReceive', 'Receive Picker', 'receive')}
            {overlayBtn('chainPicker', 'Chain Picker', null)}
            {state.overlay && (
              <button className="devbar-btn" onClick={() => dispatch({ type: 'CLOSE_OVERLAY' })}>
                Close overlay
              </button>
            )}
          </div>
          <div className="devbar-group">
            <span className="devbar-label">Actions</span>
            <button className="devbar-btn" onClick={() => dispatch({ type: 'ADD_ASSET', asset: pickDefaultSendAsset(state.sendAssets.length) })}>
              Add asset
            </button>
            <button className="devbar-btn" onClick={() => dispatch({ type: 'TOGGLE_DETAILS', kind: 'fees' })}>
              Toggle fees detail
            </button>
            <button className="devbar-btn" onClick={() => dispatch({ type: 'TOGGLE_DETAILS', kind: 'assets' })}>
              Toggle assets detail
            </button>
            <button className="devbar-btn danger" onClick={() => dispatch({ type: 'RESET' })}>
              Reset
            </button>
          </div>
          <div className="devbar-state">
            <span className="k">mode</span>=<span className="v">"{state.mode}"</span>
            {'  '}<span className="k">overlay</span>=<span className="v">{state.overlay ? '"' + state.overlay + '"' : 'null'}</span>
            {'  '}<span className="k">sendAssets</span>=<span className="v">[{state.sendAssets.length}]</span>
            {'  '}<span className="k">amount</span>=<span className="v">"{state.amount}"</span>
            {'  '}<span className="k">recipient</span>=<span className="v">"{state.recipient}"</span>
            {'  '}<span className="k">pickerFilter</span>=<span className="v">"{state.pickerFilter}"</span>
            {'  '}<span className="k">detailsExpanded</span>=<span className="v">{state.detailsExpanded ? '"' + state.detailsExpanded + '"' : 'null'}</span>
            {'  '}<span className="k">pendingStep</span>=<span className="v">{state.pendingStep}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────

    function App() {
      const [state, dispatch] = useReducer(reducer, initialState);

      // Pending screen: show the expanded steps statically (no auto-advance).
      // The user wants to inspect this state, not watch it cycle. Park at
      // step=3 so all 4 rows are visible (verifying / verified / verified /
      // failed-retrying) without auto-flipping to success.
      useEffect(() => {
        if (state.mode !== 'pending') return;
        dispatch({ type: 'SET_PENDING_STEP', step: 3 });
      }, [state.mode]);

      const modeId = MODE_SCREEN[state.mode] || '3H-0';
      const overlayId = state.overlay ? OVERLAY_SCREEN[state.overlay] : null;

      return (
        <div className="app">
          <DevBar state={state} dispatch={dispatch} />

          <div className="screen-host">
            <div className="stage">
              <div key={'mode-' + state.mode} className="mode-screen slide-enter">
                <Screen id={modeId} state={state} dispatch={dispatch} />
              </div>

              {overlayId && (
                <>
                  <div className="overlay-dim" onClick={() => dispatch({ type: 'CLOSE_OVERLAY' })} />
                  <div key={'ov-' + state.overlay} className="overlay-stage fade-enter">
                    <Screen id={overlayId} state={state} dispatch={dispatch} />
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
